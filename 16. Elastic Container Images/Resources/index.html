<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudFreeks</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0b4f5c, #08313a);
      color: #fff;
      overflow: hidden;
    }
    .card {
      width: min(92vw, 720px);
      padding: 48px 32px;
      text-align: center;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(10px);
    }
    h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      color: #ff9f2e;
      text-shadow: 0 2px 10px rgba(0,0,0,.25);
      margin-bottom: 14px;
      letter-spacing: 0.5px;
    }
    p {
      font-size: 1.05rem;
      color: rgba(255,255,255,0.9);
      margin-bottom: 28px;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      padding: 14px 26px;
      border-radius: 999px;
      background: #ff9f2e;
      color: #123;
      text-decoration: none;
      font-weight: 700;
      transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
      box-shadow: 0 10px 24px rgba(255, 159, 46, 0.28);
    }
    a:hover {
      transform: translateY(-2px);
      background: #ffab49;
    }
    .tag {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.9);
      font-size: 0.88rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="tag">CloudFreeks</div>
    <h1>CloudFreeks</h1>
    <p>Welcome to a modern cloud-powered platform built for learning, building, and deploying with confidence.</p>
    <a href="#">Visit CloudFreeks</a>
  </div>
</body>
</html>
